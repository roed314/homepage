    description: As part of a <a href="https://arxiv.org/abs/2002.04717">large group effort</a>, we rebuilt the classical modular form section of the LMFDB from scratch, using code from <a href="http://magma.maths.usyd.edu.au/magma/handbook/part/17">Magma</a>, <a href="https://pari.math.u-bordeaux.fr/dochtml/html/Modular_forms.html">Pari</a> and <a href="https://doc.sagemath.org/html/en/reference/modfrm/index.html">Sage</a>.  My contributions were mostly on front-end code, so are reflected in the commits to the <a href="https://github.com/LMFDB/lmfdb/graphs/contributors">LMFDB respository</a> more than the <a href="https://github.com/JohnCremona/CMFs/graphs/contributors">CMF repository</a>.
