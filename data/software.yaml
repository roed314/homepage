    description: With the start of the COVID-19 pandemic, many research seminars moved online.  Together with Costa, Poonen and Sutherland, I created an online index of these seminars which helps researchers worldwide find talks of interest that are newly accessible.  It also provides useful tools for creating lightweight homepages for seminars and conferences.
  - name: PSet Partners
    url: https://psetpartners.mit.edu/about
    logo: /pics/psetpartners_logo.png
    banner: true
    links:
      try: https://psetpartners-test.mit.edu/
      code: https://github.com/AndrewVSutherland/psetpartners
      paper: https://www.ams.org/journals/notices/202111/rnoti-p1919.pdf
    stats_url: https://github.com/AndrewVSutherland/psetpartners/graphs/contributors
    active: 2020-2020
    commits: '17'
    additions: 12,276
    deletions: '402'
    description: The pandemic made it harder to form collaborations between students in undergraduate classes to work on homework.  This site allows instructors at MIT to opt in and help their students find study groups.  The project is mostly driven by Sutherland (and the linked paper is written by him), but I helped with the initial setup and the matching algorithm.
  - name: Psycodict
    logo: /pics/psycodict_logo.png
    banner: true
    links:
      code: https://github.com/roed314/psycodict
    stats_url: https://github.com/roed314/psycodict/graphs/contributors
    active: 2019-2025
    commits: '165'
    additions: 21,081
    deletions: 13,093
    description: The most popular interface to PostgreSQL from Python is <a href="https://www.psycopg.org/">psycopg</a>, which allows for the execution of SQL commands from python.  While robust and fast, it requires users to know SQL.  For the LMFDB, I developed a layer on top of psycopg that constructs queries from dictionaries and returns the output in dictionaries as well.  In support of researchseminars and psetpartners, this part of the LMFDB was extracted out into its own library.
  - name: Paperforge
    logo: /pics/paperforge_logo.svg
    links:
      code: https://github.com/roed-math/paperforge
    stats_url: https://github.com/roed-math/paperforge/graphs/contributors
    description: 'As language models begin to contribute to research mathematics, the process of writing papers needs new infrastructure.  Paperforge is a framework for turning an AI-written paper, backed by a <a href="https://leanprover.github.io/">Lean</a> formalization, into two synchronized outputs: LaTeX for arXiv and structured HTML with reader-controlled levels of detail and links into the formalization.  The source of truth is <a href="https://pretextbook.org/">PreTeXt</a>, authored by the model; deterministic validators (checking notation, references, and links to the formalization) provide regression safety, while generative passes handle drafting and revision.'
    active: 2026-2026
    commits: '66'
    additions: 12,940
    deletions: 1,060
