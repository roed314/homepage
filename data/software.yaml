    description: In part 1 of the project to build a database of abelian varieties over finite fields within the LMFDB (joint with Dupuy, Kedlaya and Vincent), we used the Honda-Tate theorem to enumerate isogeny classes and compute many quantities that are invariant across isogeny classes.
