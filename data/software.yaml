    description: 'The LMFDB has been a major focus of my work at MIT since 2018, and I now serve on its <a href="https://www.lmfdb.org/management">editorial board</a>.  My contributions fall into two categories: improving LMFDB''s infrastructure and adding mathematical content to the site.  On the infrastructure front, I converted the backend database from <a href="https://www.mongodb.com/">MongoDB</a> to <a href="https://www.postgresql.org/">PostgreSQL</a>, spinning off a Python-SQL interface library, <a href="https://github.com/roed314/psycodict">Psycodict</a>, in the process.  I have also worked on centralizing functionality (such as code for laying out search pages) that had been duplicated in many sections, easing the process of adding new site-wide functionality and adding new sections.  My mathematical contributions are described below.'
    since: 2008
  - name: Abelian varieties over finite fields
